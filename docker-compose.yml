services:
  app:
    build: .
    container_name: aisupport-app
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Connect to the 'chromadb' service defined below
      - CHROMA_SERVER_HOST=chromadb 
      - CHROMA_SERVER_HTTP_PORT=8000
    env_file:
      - .env
    depends_on:
      - redis
      - chromadb # Wait for Chroma to start
    volumes:
      - ./logs:/app/logs

  redis:
    image: redis:7-alpine
    container_name: aisupport-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  chromadb:
    image: chromadb/chroma:latest
    container_name: aisupport-chroma
    ports:
      - "8001:8000" # Expose on 8001 locally to avoid conflict with app on 8000
    volumes:
      - chroma_data:/chroma/chroma # Persist vector data

volumes:
  redis_data:
  chroma_data: